<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>堡貝心 Hambao - 專業諮詢與陪伴</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #fdfaf5;     /* 背景淺米色 */
            --primary-sage: #94a69d;  /* 底部柔和綠 */
            --accent-orange: #e8a57c; /* 溫暖橘色 */
            --text-main: #4a4a4a;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* 導覽列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 60px; /* 這裡可調整 Logo 大小 */
            width: auto;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            margin-left: 30px;
            font-size: 1rem;
            font-weight: 500;
        }

        nav a.active {
            color: var(--accent-orange);
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 5px;
        }

        /* 主視覺區 */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 550px;
            padding: 0 10%;
            background-image: url('https://images.unsplash.com/photo-1510154221590-ff63e90a136f?auto=format&fit=crop&w=1500&q=80'); /* 母嬰生活背景 */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-content {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .hero-content h1 {
            color: var(--primary-sage);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #666;
        }

        .btn-reserve {
            background-color: var(--accent-orange);
            color: white;
            padding: 12px 35px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-reserve:hover {
            background-color: #d18b62;
            transform: translateY(-2px);
        }

        /* 服務區塊 - 仿設計圖排版 */
        .service-footer {
            background-color: var(--primary-sage);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 40px 10%;
            color: white;
        }

        .service-item {
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 0 20px;
        }

        .service-item:last-child {
            border-right: none;
        }

        .service-icon {
            font-size: 30px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-text h4 {
            margin: 0;
            font-size: 1.1rem;
        }

        .service-text p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* 底部資訊 */
        .info-bar {
            background-color: #e8ece9;
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #777;
        }

        @media (max-width: 992px) {
            .service-footer { grid-template-columns: 1fr; gap: 30px; }
            .service-item { border-right: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="s1.jpg" alt="小亨堡Logo" class="logo-img">
            <div style="line-height: 1.2;">
                <span style="font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;">堡貝心</span><br>
                <span style="font-size: 0.9rem; color: #888;">Hambao</span>
            </div>
        </div>
        <nav>
            <a href="index3.html" class="active">首頁</a>
            <a href="#">待產媽咪諮詢</a>
            <a href="#">育兒神隊友</a>
            <a href="#">預約課程</a>
            <a href="#">關於我們</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>專業諮詢與陪伴</h1>
            <p>我是亨堡，和妳一起打造家的城堡</p>
            <a href="#" class="btn-reserve">立即預約諮詢</a>
        </div>
    </section>

    <div class="service-footer">
        <div class="service-item">
            <div class="service-icon">🤰</div>
            <div class="service-text">
                <h4>1. 待產媽咪諮詢</h4>
                <p>營養、情緒支援、產生計劃</p>
            </div>
        </div>
        <div class="service-item">
            <div class="service-icon">🍼</div>
            <div class="service-text">
                <h4>2. 育兒神隊友</h4>
                <p>嬰兒保理、孩子發育、睡眠指導</p>
            </div>
        </div>
        <div class="service-item">
            <div class="service-icon">📖</div>
            <div class="service-text">
                <h4>3. 預約課程 & 專家團隊</h4>
                <p>預程資約團隊</p>
            </div>
        </div>
    </div>

    <div class="info-bar">
        <div>站上地圖 | 關聯資訊話: 000-3136-5300 | 臉書: 小亨堡</div>
        <div>本產產的專業家政服務聯盟正法規宣告</div>
    </div>

</body>
</html>
